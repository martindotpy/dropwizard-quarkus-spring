name: Build and Publish Container Images

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/container-images.yml"
      - ".dockerignore"
      - ".mvn/**"
      - "mvnw"
      - "mvnw.cmd"
      - "pom.xml"
      - "shared/**"
      - "dropwizard/**"
      - "spring/**"
      - "quarkus/**"

concurrency:
  group: container-images-main
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      dropwizard: ${{ steps.filter.outputs.dropwizard }}
      spring: ${{ steps.filter.outputs.spring }}
      quarkus: ${{ steps.filter.outputs.quarkus }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v4.0.1
        with:
          filters: |
            dropwizard:
              - '.github/workflows/container-images.yml'
              - '.dockerignore'
              - '.mvn/**'
              - 'mvnw'
              - 'mvnw.cmd'
              - 'pom.xml'
              - 'shared/**'
              - 'dropwizard/**'
            spring:
              - '.github/workflows/container-images.yml'
              - '.dockerignore'
              - '.mvn/**'
              - 'mvnw'
              - 'mvnw.cmd'
              - 'pom.xml'
              - 'shared/**'
              - 'spring/**'
            quarkus:
              - '.github/workflows/container-images.yml'
              - '.dockerignore'
              - '.mvn/**'
              - 'mvnw'
              - 'mvnw.cmd'
              - 'pom.xml'
              - 'shared/**'
              - 'quarkus/**'

  build-dropwizard:
    name: Build and publish dropwizard
    needs: changes
    if: needs.changes.outputs.dropwizard == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: dropwizard/Dockerfile
          pull: true
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/dropwizard:latest
          cache-from: type=gha,scope=dropwizard
          cache-to: type=gha,mode=max,scope=dropwizard,ignore-error=true
          provenance: false
          sbom: false

      - name: Attest pushed image
        uses: actions/attest@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}/dropwizard
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

  build-spring:
    name: Build and publish spring
    needs: changes
    if: needs.changes.outputs.spring == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: spring/Dockerfile
          pull: true
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/spring:latest
          cache-from: type=gha,scope=spring
          cache-to: type=gha,mode=max,scope=spring,ignore-error=true
          provenance: false
          sbom: false

      - name: Attest pushed image
        uses: actions/attest@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}/spring
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

  build-quarkus-jvm:
    name: Build and publish quarkus
    needs: changes
    if: needs.changes.outputs.quarkus == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: quarkus/Dockerfile
          pull: true
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/quarkus:latest
          cache-from: type=gha,scope=quarkus-jvm
          cache-to: type=gha,mode=max,scope=quarkus-jvm,ignore-error=true
          provenance: false
          sbom: false

      - name: Attest pushed image
        uses: actions/attest@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}/quarkus
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

  build-quarkus-native-amd64:
    name: Build quarkus-native (linux/amd64)
    needs: changes
    if: needs.changes.outputs.quarkus == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 150
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@v5.0.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build native binary and run tests
        run: >-
          mvn -pl quarkus -am verify -Dnative
          -Dquarkus.native.container-build=true
          -Dquarkus.native.container-runtime=docker -DskipITs=false -B

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arch image
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: quarkus
          file: Dockerfile.native.runtime
          pull: true
          push: true
          platforms: linux/amd64
          outputs: type=registry,push-by-digest=true,name-canonical=true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/quarkus-native
          cache-from: type=gha,scope=quarkus-native-amd64
          cache-to: type=gha,mode=max,scope=quarkus-native-amd64,ignore-error=true
          provenance: false
          sbom: false

  build-quarkus-native-arm64:
    name: Build quarkus-native (linux/arm64)
    needs: changes
    if: needs.changes.outputs.quarkus == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 150
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@v5.0.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build native binary and run tests
        run: >-
          mvn -pl quarkus -am verify -Dnative
          -Dquarkus.native.container-build=true
          -Dquarkus.native.container-runtime=docker -DskipITs=false -B

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arch image
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: quarkus
          file: Dockerfile.native.runtime
          pull: true
          push: true
          platforms: linux/arm64
          outputs: type=registry,push-by-digest=true,name-canonical=true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/quarkus-native
          cache-from: type=gha,scope=quarkus-native-arm64
          cache-to: type=gha,mode=max,scope=quarkus-native-arm64,ignore-error=true
          provenance: false
          sbom: false

  publish-quarkus-native:
    name: Publish quarkus-native multi-arch manifest
    needs:
      - changes
      - build-quarkus-native-amd64
      - build-quarkus-native-arm64
    if: needs.changes.outputs.quarkus == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push latest manifest list
        run: |
          docker buildx imagetools create \
            -t "${{ env.REGISTRY }}/${{ github.repository }}/quarkus-native:latest" \
            "${{ env.REGISTRY }}/${{ github.repository }}/quarkus-native@${{ needs.build-quarkus-native-amd64.outputs.digest }}" \
            "${{ env.REGISTRY }}/${{ github.repository }}/quarkus-native@${{ needs.build-quarkus-native-arm64.outputs.digest }}"

      - name: Resolve latest manifest digest
        id: manifest
        run: |
          image="${{ env.REGISTRY }}/${{ github.repository }}/quarkus-native:latest"
          digest="$(docker buildx imagetools inspect "$image" | awk '/Digest:/ {print $2; exit}')"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Attest pushed image
        uses: actions/attest@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}/quarkus-native
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true
          create-storage-record: false
